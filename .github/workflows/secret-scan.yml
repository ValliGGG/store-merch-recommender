name: secret-scan

# Defense in depth alongside GitHub secret scanning + push protection: fail the
# build if any credential pattern is committed (covers custom patterns too).

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan tree for committed credentials
        run: |
          # Real tokens only — placeholders like shpat_xxx / shpat_… won't match.
          PATTERN='shp(at|ca|pa|ss)_[A-Za-z0-9]{16,}|AIza[0-9A-Za-z_-]{30,}|ghp_[A-Za-z0-9]{30,}|xox[baprs]-[A-Za-z0-9-]{10,}|-----BEGIN (RSA |OPENSSH |EC )?PRIVATE KEY-----'
          if grep -rInE "$PATTERN" --exclude-dir=.git .; then
            echo "::error::Possible committed credential detected (matches above). Remove it and rotate the key."
            exit 1
          fi
          echo "OK — no credential patterns found."
